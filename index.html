<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Adoption Agency</title>
  <!-- 3. Link the CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Cat Adoption Agency</h1>
  </header>

  <main>
    <!-- 4. Cat breed container -->
    <div class="cat-container">
      
      <!-- Individual cat breed cards -->
      <article class="cat-breed">
        <img src="https://placehold.co" alt="Siamese">
        <h3>Siamese</h3>
        <p>Affectionate, social, and very vocal. They love being around their humans.</p>
      </article>

      <article class="cat-breed">
        <img src="https://placehold.co" alt="Maine Coon">
        <h3>Maine Coon</h3>
        <p>The "gentle giants" of the cat world. Known for their size and friendly nature.</p>
      </article>

      <article class="cat-breed">
        <img src="https://placehold.co" alt="Persian">
        <h3>Persian</h3>
        <p>Quiet and sweet, these cats prefer a calm environment and lots of grooming.</p>
      </article>

    </div>
  </main>
</body>
</html>
